name: LiveGuru Bot CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-hin
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check code syntax
      run: |
        python -m py_compile liveguru_bot.py
        echo "✅ Syntax check passed"
    
    - name: Test imports
      run: |
        python -c "import cv2, pytesseract, telegram, google.generativeai; print('✅ All imports working')"
    
